<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Task 1</title>
</head>
<body>

  <ul id="categories">
    <li class="item">
      <h2>Animals</h2>
      <ul>
        <li>Cat</li>
        <li>Hamster</li>
        <li>Horse</li>
        <li>Parrot</li>
      </ul>
    </li>
    <li class="item">
      <h2>Products</h2>
      <ul>
        <li>Bread</li>
        <li>Parsley</li>
        <li>Cheese</li>
      </ul>
    </li>
    <li class="item">
      <h2>Technologies</h2>
      <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
        <li>React</li>
        <li>Node.js</li>
      </ul>
    </li>
  </ul>

  <script>
    const categories = document.querySelectorAll('#categories .item');

    console.log(`Кількість категорій: ${categories.length}`);

    categories.forEach(item => {
      const title = item.querySelector('h2').textContent;
      const count = item.querySelectorAll('ul li').length;

      console.log(`${title}: ${count} items`);
    });
  </script>

</body>
</html>
